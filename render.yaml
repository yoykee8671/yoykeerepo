services:
  - type: web
    name: wooofpay
    runtime: docker
    region: singapore
    plan: starter
    autoDeploy: true
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: HOST
        value: 0.0.0.0
      - key: PORT
        value: 4173
      - key: DATABASE_URL
        sync: false
      - key: BOOTSTRAP_ADMIN_NAME
        sync: false
      - key: BOOTSTRAP_ADMIN_EMAIL
        sync: false
      - key: BOOTSTRAP_ADMIN_PASSWORD
        sync: false
      - key: GOOGLE_APPS_SCRIPT_WEBHOOK_URL
        sync: false
